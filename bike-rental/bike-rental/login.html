<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — VeloRent</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono&display=swap" rel="stylesheet"/>
</head>
<body class="auth-page">

  <!-- Decorative background -->
  <div class="auth-bg">
    <div class="auth-glow auth-glow-1"></div>
    <div class="auth-glow auth-glow-2"></div>
  </div>

  <!-- Navbar minimal -->
  <nav class="navbar scrolled">
    <div class="nav-inner">
      <a href="index.html" class="logo">VELO<span>RENT</span></a>
      <div class="nav-auth">
        <a href="register.html" class="btn btn-accent">Register</a>
      </div>
    </div>
  </nav>

  <!-- Auth Container -->
  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-card-header">
        <p class="section-label">WELCOME BACK</p>
        <h1 class="auth-title">Sign In</h1>
        <p class="auth-sub">Don't have an account? <a href="register.html">Register →</a></p>
      </div>

      <!-- Error / success messages -->
      <div class="form-message" id="formMessage" style="display:none;"></div>

      <form id="loginForm" class="auth-form" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-icon-wrap">
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password"/>
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">👁</button>
          </div>
        </div>
        <button type="submit" class="btn btn-accent btn-full" id="loginBtn">
          <span id="loginBtnText">Sign In</span>
          <span id="loginSpinner" class="spinner" style="display:none;"></span>
        </button>
      </form>

      <div class="auth-divider"><span>or</span></div>
      <p class="auth-footer-note">By signing in, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</p>
    </div>
  </main>

  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script>
    // Toggle password visibility
    document.getElementById('togglePw').addEventListener('click', function() {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
      this.textContent = pw.type === 'password' ? '👁' : '🙈';
    });
  </script>
</body>
</html>
